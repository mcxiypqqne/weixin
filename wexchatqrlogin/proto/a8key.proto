syntax = "proto3";

// 微信授权确认请求 - 基于逆向分析
// 原始数据长度: 215 bytes

message WxAuthRequest {

  // ── field 1: 设备/应用信息 (52 bytes, 嵌套消息) ──
  message DeviceInfo {
    bytes   field_1  = 1;   // 1 byte, 通常 0x00
    int64   field_2  = 2;   // 10-byte varint, 可能是加密的 device_id 或 token
    bytes   field_3  = 3;   // 16 bytes, 设备标识 (如 "A2052943da3b41f\0")
    uint64  field_4  = 4;   // 5-byte varint, 数值型标识
    string  field_5  = 5;   // 平台版本 (如 "android-33")
    int32   field_6  = 6;   // 通常 0
  }
  DeviceInfo device_info = 1;

  // ── field 2 ──
  int32   field_2  = 2;   // 值固定为 2

  // ── field 3: 嵌套消息 (4 bytes) ──
  message Field3 {
    int32  f1 = 1;  // 通常 0
    bytes  f2 = 2;  // 通常空
  }
  Field3   field_3  = 3;

  // ── field 4 ──
  bytes    field_4  = 4;   // 空

  // ── field 7: 微信登录确认 URL ──
  string   confirm_url = 7;  // "https://open.weixin.qq.com/connect/confirm?uuid=XXXX"

  // ── 后续字段 (部分含义未知) ──
  int32    field_9  = 9;   // 0
  int32    field_10 = 10;  // 4
  bytes    field_11 = 11;  // 空

  message Field13 {
    int32  f1 = 1;  // 0
    bytes  f2 = 2;  // 空
  }
  Field13  field_13 = 13;

  int32    field_14 = 14;  // 0
  int32    field_15 = 15;  // 0
  int32    field_16 = 16;  // 0

  int32    field_18 = 18;  // 19 (0x13)
  int32    field_19 = 19;  // 6

  // ★ 关键变体字段: 时间戳/序列号 (varint, ~5 bytes)
  uint64   field_20 = 20;  // 毫秒级时间戳 (自定义 epoch)

  int32    field_22 = 22;  // 0

  message Field23 {
    int32  f1 = 1;  // 0
    bytes  f2 = 2;  // 空
  }
  Field23  field_23 = 23;

  int32    field_25 = 25;  // 1
  bytes    field_28 = 28;  // 空
  bytes    field_29 = 29;  // 空
  bytes    field_30 = 30;  // 空
  int32    field_33 = 33;  // 0
  int32    field_34 = 34;  // 0

  message Field35 {
    int32  f1 = 1;   // 16
    int32  f2 = 2;   // 8
    int32  f3 = 5;   // 0
    int32  f4 = 6;   // 0
    bytes  f5 = 7;   // 空
    int32  f6 = 8;   // 0
    bytes  f7 = 9;   // 空
    int32  f8 = 11;  // 0
  }
  Field35  field_35 = 35;
}
